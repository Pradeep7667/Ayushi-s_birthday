<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Cinematic</title>
<link rel="stylesheet" href="style.css">
</head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">
  <h1 class="glow">🎁 Surprise For You 🎁</h1>
  <button onclick="start()">Open</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">

  <!-- particles -->
  <div id="particles"></div>

  <!-- PHOTO -->
  <img src="ayushi.jpeg" class="photo">


<!-- FLOATING IMAGES -->
<img src="img1.jpg" class="floating f1">
<img src="img2.jpg" class="floating f2">
<img src="img3.jpg" class="floating f3">
<img src="img4.jpg" class="floating f4">



  <!-- CAKE GIF -->
  <img src="cake.gif" id="cake" class="cake">

  <!-- TEXT -->
  <h1 id="text"></h1>

  <!-- SHAYARI -->
  <div id="shayari">
    🎂 "Janamdin ki bahut badhai ho,<br>
    Har din khushiyon se bhara ho!" 💖
     मेरी लाइफ में तेरा आना किसी blessings से कम नहीं है। ✨ 
    बस दुआ है कि Aap हमेशा ऐसे ही हंसती-खेलती रहे और तेरी ज़िंदगी खुशियों से भरी रहे।
     Happy Birthday to my best sister/friend forever! 🎂🎈🧿
  </div>

  <!-- BALLOONS -->
  <div class="balloon red"></div>
  <div class="balloon blue"></div>
  <div class="balloon green"></div>
  <div class="balloon yellow"></div>
  <div class="balloon pink"></div>

</div>

<audio id="music" src="happy-birthday.mp3" loop preload="auto"></audio>


<script src="script.js"></script>
</body>
</html>
